name: 'Docker Sidecar - Run Docker'
description: 'Starts a Linux sidecar with exposed Docker Host'
author: 'Aleksandr Britvin'

inputs:
  wait-for-job:
    required: true
    default: ''
    description: 'Name of the job to wait for completion before shutting down the sidecar'
  authorized-keys:
    required: true
    default: ''
    description: 'Authorized keys to connect to SSH server for port forwarding'
  timeout:
    required: false
    default: '3600'
    description: 'Maximum time in seconds to keep sidecar alive'
  tls-verify:
    required: false
    default: 'true'
    description: 'Enable TLS verification for Docker daemon'
  certificate-domains:
    description: 'Comma separated allowed domains for the result certificates'
    default: 'localhost'
    required: false
  certificates-encryption-key:
    description: 'Key to encrypt certificates before uploading'
    default: ''
    required: false

runs:
  using: "composite"
  steps:
    - name: Verify Linux environment
      shell: bash
      run: |
        if [[ "$RUNNER_OS" != "Linux" ]]; then
          echo "This action requires a Linux runner."
          exit 1
        fi

        if [[ -z "${{ inputs.wait-for-job }}" ]]; then
          echo "wait-for-job input is required."
          exit 1
        fi

    - name: Setup SSH server
      id: setup-sshd
      uses: lexbritvin/setup-sshd-action@main
      with:
        authorized-keys: ${{ inputs.authorized-keys }}

    - name: Generate TLS certificates for Docker
      id: generate-certs
      shell: bash
      if: ${{ inputs.tls-verify == 'true' }}
      run: |
        # Create directories for Docker certs
        mkdir -p docker-certs/client
        
        # Generate CA certificate
        openssl genrsa -out docker-certs/ca-key.pem 4096
        openssl req -new -x509 -days 365 -key docker-certs/ca-key.pem -sha256 \
          -out docker-certs/ca.pem -subj "/CN=docker-ca"
        
        # Generate server certificate
        openssl genrsa -out docker-certs/server-key.pem 4096
        openssl req -subj "/CN=docker-server" -sha256 -new \
          -key docker-certs/server-key.pem -out docker-certs/server.csr
        
        # Configure server certificate with serveo.net domains
        CERTIFICATE_DOMAINS="$(echo "${{ inputs.certificate-domains }}" | sed 's/,/,DNS:/g' | sed 's/^/DNS:/')"
        echo "subjectAltName = ${CERTIFICATE_DOMAINS},IP:127.0.0.1" > docker-certs/extfile.cnf
        echo "extendedKeyUsage = serverAuth" >> docker-certs/extfile.cnf
        
        # Sign server certificate
        openssl x509 -req -days 365 -sha256 \
          -in docker-certs/server.csr \
          -CA docker-certs/ca.pem \
          -CAkey docker-certs/ca-key.pem \
          -CAcreateserial \
          -out docker-certs/server-cert.pem \
          -extfile docker-certs/extfile.cnf
        
        # Generate client certificate
        openssl genrsa -out docker-certs/client/key.pem 4096
        openssl req -subj '/CN=docker-client' -new \
          -key docker-certs/client/key.pem \
          -out docker-certs/client.csr
        
        # Configure client certificate
        echo "extendedKeyUsage = clientAuth" > docker-certs/client-extfile.cnf
        
        # Sign client certificate
        openssl x509 -req -days 365 -sha256 \
          -in docker-certs/client.csr \
          -CA docker-certs/ca.pem \
          -CAkey docker-certs/ca-key.pem \
          -CAcreateserial \
          -out docker-certs/client/cert.pem \
          -extfile docker-certs/client-extfile.cnf
        
        # Copy CA cert for client
        cp docker-certs/ca.pem docker-certs/client/ca.pem
        
        # Set proper permissions
        chmod 0400 docker-certs/ca-key.pem docker-certs/server-key.pem docker-certs/client/key.pem
        chmod 0444 docker-certs/ca.pem docker-certs/server-cert.pem docker-certs/client/cert.pem
        
        # Create artifact with client certificates
        mkdir -p client-certs
        cp -r docker-certs/client/* client-certs/
        tar -C client-certs -cf client-certs.tar .

        openssl enc -aes-256-cbc -in client-certs.tar -out client-certs.enc -k "${{ inputs.certificates-encryption-key }}" -pbkdf2
        rm -rf client-certs/ client-certs.tar

    - name: Start Docker daemon
      id: start-docker
      shell: bash
      run: |
        # Configure Docker daemon
        echo "Configuring Docker daemon..."
        if [[ "${{ inputs.tls-verify }}" == "true" ]]; then
          sudo tee /etc/docker/daemon.json > /dev/null <<EOF
          {
            "tls": true,
            "tlsverify": true,
            "tlscacert": "$(pwd)/docker-certs/ca.pem",
            "tlscert": "$(pwd)/docker-certs/server-cert.pem",
            "tlskey": "$(pwd)/docker-certs/server-key.pem",
            "hosts": ["fd://", "unix:///var/run/docker.sock", "tcp://0.0.0.0:2376"]
          }
        EOF
        else
          sudo tee /etc/docker/daemon.json > /dev/null <<EOF
          {
            "hosts": ["fd://", "unix:///var/run/docker.sock", "tcp://0.0.0.0:2376"]
          }
        EOF
        fi
        
        cat /etc/docker/daemon.json
      
        # Create systemd override directory
        sudo mkdir -p /etc/systemd/system/docker.service.d/
      
        # Configure systemd to use the daemon.json
        sudo tee /etc/systemd/system/docker.service.d/override.conf > /dev/null <<EOF
        [Service]
        ExecStart=
        ExecStart=/usr/bin/dockerd --containerd=/run/containerd/containerd.sock
        EOF
      
        # Reload systemd and restart Docker
        echo "Restarting Docker daemon..."
        sudo systemctl daemon-reload
        sudo systemctl restart docker
        
        # Wait for Docker daemon to start
        echo "Waiting for Docker daemon to become available..."
        export DOCKER_HOST=tcp://localhost:2376
        export DOCKER_TLS_VERIFY=${{ inputs.tls-verify == 'true' && '1' || '' }}
        export DOCKER_CERT_PATH=${{ inputs.tls-verify == 'true' && '$(pwd)/docker-certs/client' || '' }}
        
        MAX_ATTEMPTS=30
        ATTEMPT=0
        while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
          ATTEMPT=$((ATTEMPT+1))
          if docker info > /dev/null 2>&1; then
            echo "Docker daemon started successfully"
            break
          fi
          echo "Waiting for Docker daemon (attempt $ATTEMPT/$MAX_ATTEMPTS)..."
          sleep 2
        done
        
        if [ $ATTEMPT -eq $MAX_ATTEMPTS ]; then
          echo "::error::Timed out waiting for Docker daemon to start"
          exit 1
        fi
        
        echo "DOCKER_HOST=$DOCKER_HOST" > sidecar-details.env

    - name: Forward SSHD port
      id: setup-sshd-forward
      uses: lexbritvin/ssh-port-forward-action@main
      with:
        host: serveo.net
        username: "gh-${{ github.job }}-${{ github.run_id }}-sidecar"
        password: "any"
        remote_forwards: "gh-${{ github.job }}-${{ github.run_id }}-sidecar:2222:localhost:2222"
        known_hosts: |
          serveo.net ssh-rsa 

    - name: Upload sidecar connection details
      uses: actions/upload-artifact@v4
      with:
        name: sidecar-details
        path: sidecar-details.env
        retention-days: 1

    - name: Upload Docker client certificates
      uses: actions/upload-artifact@v4
      if: ${{ inputs.tls-verify == 'true' }}
      with:
        name: docker-certs
        path: client-certs.enc
        retention-days: 1

    - name: Keep sidecar alive and monitor for shutdown signal
      id: keep-alive
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        echo "Sidecar is running..."
        echo "Waiting for shutdown signal or timeout (${{ inputs.timeout }} seconds)..."

        # Start time
        START_TIME=$(date +%s)
        TIMEOUT_SECONDS=${{ inputs.timeout }}
        END_TIME=$((START_TIME + TIMEOUT_SECONDS))

        # Keep alive loop
        while true; do
          CURRENT_TIME=$(date +%s)

          # Check if timeout has been reached
          if [ $CURRENT_TIME -gt $END_TIME ]; then
            echo "Timeout reached, shutting down sidecar"
            break
          fi

          # Check if a specific job has completed (if specified)
          if [ -n "${{ inputs.wait-for-job }}" ]; then
            JOB_NAME_PREFIX="${{ inputs.wait-for-job }}"
            echo "Checking matrix jobs starting with: $JOB_NAME_PREFIX"
          
            JOBS_JSON=$(gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs)
          
            # Filter jobs whose name starts with the input (matrix jobs have names like "test (ubuntu-latest)")
            INCOMPLETE=$(echo "$JOBS_JSON" | jq -r \
              --arg prefix "$JOB_NAME_PREFIX" \
              '.jobs[] | select(.name | startswith($prefix)) | select(.conclusion == null) | .name')
          
            if [ -z "$INCOMPLETE" ]; then
              echo "All jobs for '$JOB_NAME_PREFIX' have completed."
              echo "Terminating sidecar..."
              break
            else
              echo "Some jobs for '$JOB_NAME_PREFIX' are still running:"
              echo "$INCOMPLETE"
            fi
          fi

          # Sleep for a while before checking again
          echo "Sidecar running... (will timeout in $((END_TIME - CURRENT_TIME)) seconds)"
          sleep 30
        done

        echo "Sidecar is shutting down"


