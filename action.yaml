name: 'Docker Sidecar'
description: 'Set up a Linux Docker sidecar for Windows and macOS runners'
author: 'Aleksandr Britvin'

inputs:
  tlsVerify:
    description: 'Whether to enable TLS verification'
    required: false
    default: 'true'

outputs:
  docker-host:
    description: 'Docker host connection string'
  docker-cert-path:
    description: 'Path to Docker TLS certificates'

runs:
  using: 'node20'
  main: dist/index.js
  post: dist/index.js
  post-if: 'always()'
