name: 'Docker Sidecar'
description: 'Set up a Linux Docker sidecar for Windows and macOS runners'
author: 'Aleksandr Britvin'

inputs:
  workflow:
    description: 'Name of the workflow file to use for sidecar'
    required: true
  timeout:
    description: 'Maximum time in seconds to keep sidecar alive'
    required: false
    default: '3600'
  tlsVerify:
    description: 'Whether to enable TLS verification'
    required: false
    default: 'true'

outputs:
  sidecar-id:
    description: 'Unique ID for the sidecar workflow'
  docker-host:
    description: 'Docker host connection string'
  docker-cert-path:
    description: 'Path to Docker TLS certificates'

runs:
  using: 'node20'
  main: dist/index.js
  post: dist/index.js
  post-if: 'always()'
