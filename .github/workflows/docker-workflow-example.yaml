name: Docker Workflow Example

on:
  push:
    branches: [ main ]

env:
  SSH_JUMP_SERVER: ssh-j.com
  SSH_JUMP_HOST_KEY: |
    ssh-j.com ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIIiyFQuTwegicQ+8w7dLA7A+4JMZkCk8TLWrKPklWcRt

jobs:
  client-ssh-key:
    name: Generate SSH Key
    runs-on: ubuntu-latest
    outputs:
      private-key: ${{ steps.generate-key.outputs.private_key }}
      public-key: ${{ steps.generate-key.outputs.public_key }}
    steps:
      - name: Generate ED25519 SSH key pair
        id: generate-key
        run: |
          ssh-keygen -t ed25519 -N "" -f ./id_ed25519

          echo "Export private ssh key"
          {
            echo "private_key<<EOF"
            cat ./id_ed25519
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          # TODO: Find a way to protect private key. Masking doesn't work to share between jobs.

          echo "public_key=$(cat ./id_ed25519.pub)" >> $GITHUB_OUTPUT
  
  linux-sidecar:
    name: Linux Docker Sidecar
    needs: [client-ssh-key]
    runs-on: ubuntu-latest
    steps:
      - name: Install CIFS
        shell: bash
        run: |
          sudo apt update
          sudo apt install cifs-utils -y  # Ubuntu/Debian
          #sudo yum install cifs-utils  # RHEL/CentOS
      - name: Run Linux Docker sidecar
        uses: lexbritvin/docker-sidecar-action/run-sidecar@main
        with:
          wait-for-job: "Windows Job"
          jump-host: ${{ env.SSH_JUMP_SERVER }}
          jump-host-key: ${{ env.SSH_JUMP_HOST_KEY }}
          authorized-keys: ${{ needs.client-ssh-key.outputs.public-key }}
  
  windows-job:
    name: Windows Job
    needs: [client-ssh-key]
    runs-on: windows-latest
    env:
      SSH_JUMP_HOST: gh-linux-sidecar-${{ github.run_id }}-sidecar
    steps:
      - name: Create run subdir
        shell: bash
        run: |
          TMPDIR="run-$(date +%s)-$RANDOM"
          mkdir -p "$TMPDIR"
          echo "TMP_WORKING_DIR=$TMPDIR" >> $GITHUB_ENV
          echo "Created temporary directory: $TMPDIR"
          cd $TMPDIR

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: ${{ env.TMP_WORKING_DIR }}

      - name: Setup SSH Config
        shell: bash
        env:
          PRIVATE_KEY: ${{ needs.client-ssh-key.outputs.private-key }}
        run: |
          # Create SSH config directory if it doesn't exist
          mkdir -p $HOME/.ssh
          
          PRIVATE_KEY_PATH="$HOME/.ssh/id_ed25519_tmp"
          echo "$PRIVATE_KEY" > "$PRIVATE_KEY_PATH"
          chmod 600 "$PRIVATE_KEY_PATH"
          
          # Convert path to Windows format when on Windows
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            PRIVATE_KEY_PATH_FOR_CONFIG=$(cygpath -w "$PRIVATE_KEY_PATH")
          else
            PRIVATE_KEY_PATH_FOR_CONFIG="$PRIVATE_KEY_PATH"
          fi
          
          # Create SSH config file
          cat > $HOME/.ssh/config << EOF
          Host jump-server
            HostName ${{ env.SSH_JUMP_SERVER }}
            User ${{ env.SSH_JUMP_HOST }}
            IdentityFile "$PRIVATE_KEY_PATH_FOR_CONFIG"
            StrictHostKeyChecking no
            PreferredAuthentications publickey
          
          Host docker-sidecar
            HostName ${{ env.SSH_JUMP_HOST }}
            Port 2222
            User runner
            IdentityFile "$PRIVATE_KEY_PATH_FOR_CONFIG"
            ProxyJump jump-server
            StrictHostKeyChecking no
            PreferredAuthentications publickey
          EOF
          
          echo "SSH config created:"
          cat $HOME/.ssh/config

      # Set up the Docker sidecar environment
      - name: Set up Remote Docker
        id: docker-setup
        uses: lexbritvin/docker-sidecar-action@main

      - name: Create SMB user and share on Windows
        shell: powershell
        working-directory: ${{ env.TMP_WORKING_DIR }}
        run: |
          # Get current working directory for the share
          $CURRENT_DIR = Get-Location
          $SHARE_NAME = "workspace_share"
          $SMB_USER = "smbuser"
          $SMB_PASSWORD = "SecurePass123!"

          # Create new local user with password on Windows
          $SecurePassword = ConvertTo-SecureString $SMB_PASSWORD -AsPlainText -Force
          New-LocalUser -Name $SMB_USER -Password $SecurePassword -FullName "SMB User" -Description "User for SMB sharing"

          # Add user to appropriate groups for file sharing
          Add-LocalGroupMember -Group "Users" -Member $SMB_USER

          # Create SMB share on current directory
          New-SmbShare -Name $SHARE_NAME -Path $CURRENT_DIR -FullAccess $SMB_USER

          # Grant user permissions on the directory
          $acl = Get-Acl $CURRENT_DIR
          $accessRule = New-Object System.Security.AccessControl.FileSystemAccessRule($SMB_USER, "FullControl", "ContainerInherit,ObjectInherit", "None", "Allow")
          $acl.SetAccessRule($accessRule)
          Set-Acl $CURRENT_DIR $acl

          Write-Host "SMB share '$SHARE_NAME' created at path: $CURRENT_DIR"
          Write-Host "User '$SMB_USER' created and granted access"

      - name: Forward Docker port
        uses: lexbritvin/ssh-port-forward-action@main
        with:
          host: docker-sidecar
          local_forwards: "2376:localhost:2376"
          remote_forwards: "1445:localhost:445"
          known_hosts: |
            ${{ env.SSH_JUMP_HOST_KEY }}

