      - name: Create equivalent path and mount CIFS on Linux
        shell: bash
        working-directory: ${{ env.TMP_WORKING_DIR }}
        run: |
          # Get current working directory (convert Windows path format if needed)
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            CURRENT_DIR=$(pwd)
            MOUNT_POINT="/mnt/$(pwd)"
          else
            CURRENT_DIR=$(pwd)
            MOUNT_POINT="$CURRENT_DIR"
          fi
          
          SHARE_NAME="workspace_share"
          SMB_USER="smbuser"
          SMB_PASSWORD="SecurePass123!"
          
          # Create mount point on Linux
          ssh docker-sidecar "sudo mkdir -p $MOUNT_POINT"
          
          # Create credentials file for CIFS mount
          ssh docker-sidecar "sudo tee /etc/cifs-credentials > /dev/null << EOF
          username=$SMB_USER
          password=$SMB_PASSWORD
          domain=WORKGROUP
          EOF"
          
          # Set proper permissions on credentials file
          ssh docker-sidecar "sudo chmod 600 /etc/cifs-credentials"
          
          # Mount the Windows SMB share via forwarded port
          ssh docker-sidecar "sudo mount -t cifs //localhost/$SHARE_NAME $MOUNT_POINT -o credentials=/etc/cifs-credentials,port=1445,vers=3.0,iocharset=utf8,file_mode=0755,dir_mode=0755,nobrl"
          
          # Verify the mount is successful
          ssh docker-sidecar "df -h | grep $MOUNT_POINT && ls -la $MOUNT_POINT"
          
          # Test file operations
          ssh docker-sidecar "echo 'Test from Linux CIFS mount to Windows share' | sudo tee $MOUNT_POINT/linux_test.txt"
          
          # Also create the equivalent path structure and test access there
          ssh docker-sidecar "ls -la $MOUNT_POINT"
          
          echo "CIFS mount successful! Windows share accessible at $MOUNT_POINT on Linux"

      - name: Run Docker container with volume mount
        shell: bash
        working-directory: ${{ env.TMP_WORKING_DIR }}
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            export MSYS_NO_PATHCONV=1
          fi
          # Create a test file in the workspace
          echo "Hello from the host" > test-file.txt

          # Mount the workspace and access the file from the container
          docker run --rm -v "/mnt$(pwd):/workspace" alpine:latest sh -c "cat /workspace/test-file.txt && echo 'Hello from the container' >> /workspace/test-file.txt"

          # Verify the file was modified
          cat test-file.txt | grep "Hello from the container"
          cat test-file.txt

      - name: 🛠 Set up tmate session 🛠
        id: tmate
        uses: mxschmitt/action-tmate@v3
        if: ${{ failure() }}
        with:
          limit-access-to-actor: true

      - name: Cleanup Mutagen
        if: always()
        shell: bash
        run: |
          # Stop sync sessions
          mutagen sync terminate "workspace-sync" || true
          mutagen daemon stop || true
