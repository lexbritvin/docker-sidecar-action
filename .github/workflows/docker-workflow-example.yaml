name: Docker Workflow Example

on:
  push:
    branches: [ main ]

env:
  SSH_JUMP_SERVER: ssh-j.com
  SSH_JUMP_HOST_KEY: |
    ssh-j.com ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIIiyFQuTwegicQ+8w7dLA7A+4JMZkCk8TLWrKPklWcRt

jobs:
  client-ssh-key:
    name: Generate SSH Key
    runs-on: ubuntu-latest
    outputs:
      private-key: ${{ steps.generate-key.outputs.private_key }}
      public-key: ${{ steps.generate-key.outputs.public_key }}
    steps:
      - name: Generate ED25519 SSH key pair
        id: generate-key
        run: |
          ssh-keygen -t ed25519 -N "" -f ./id_ed25519

          echo "Export private ssh key"
          {
            echo "private_key<<EOF"
            cat ./id_ed25519
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          # TODO: Find a way to protect private key. Masking doesn't work to share between jobs.

          echo "public_key=$(cat ./id_ed25519.pub)" >> $GITHUB_OUTPUT
  
  linux-sidecar:
    name: Linux Docker Sidecar
    needs: [client-ssh-key]
    runs-on: ubuntu-latest
    steps:
      - name: Run Linux Docker sidecar
        uses: lexbritvin/docker-sidecar-action/run-sidecar@main
        with:
          wait-for-job: "Windows Job"
          jump-host: ${{ env.SSH_JUMP_SERVER }}
          jump-host-key: ${{ env.SSH_JUMP_HOST_KEY }}
          authorized-keys: ${{ needs.client-ssh-key.outputs.public-key }}
  
  windows-job:
    name: Windows Job
    needs: [client-ssh-key]
    runs-on: windows-latest
    env:
      SSH_JUMP_HOST: gh-linux-sidecar-${{ github.run_id }}-sidecar
    steps:
      - name: Create run subdir
        shell: bash
        run: |
          TMPDIR="run-$(date +%s)-$RANDOM"
          mkdir -p "$TMPDIR"
          echo "TMP_WORKING_DIR=$TMPDIR" >> $GITHUB_ENV
          echo "Created temporary directory: $TMPDIR"
          cd $TMPDIR

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: ${{ env.TMP_WORKING_DIR }}

      - name: Export SSH key to file
        id: export-key
        shell: bash
        env:
          PRIVATE_KEY: ${{ needs.client-ssh-key.outputs.private-key }}
        run: |
          pwd
          mkdir -p ~/.ssh
          echo "$PRIVATE_KEY" > ~/.ssh/id_ed25519_tmp
          chmod 600 ~/.ssh/id_ed25519_tmp
          echo "key_path=~/.ssh/id_ed25519_tmp" >> $GITHUB_OUTPUT

      # Set up the Docker sidecar environment
      - name: Set up Remote Docker
        id: docker-setup
        uses: lexbritvin/docker-sidecar-action@main

      - name: Forward Docker port
        uses: lexbritvin/ssh-port-forward-action@main
        with:
          host: ${{ env.SSH_JUMP_HOST }}
          port: 2222
          username: "runner"
          jump_hosts: ${{ env.SSH_JUMP_HOST }}@${{ env.SSH_JUMP_SERVER }}
          private_key_path: ${{ steps.export-key.outputs.key_path }}
          local_forwards: "2376:localhost:2376,2223:localhost:2222"
          ssh_flags: -o StrictHostKeyChecking=no -o PreferredAuthentications=publickey
          known_hosts: |
            ${{ env.SSH_JUMP_HOST_KEY }}

      - name: Install Mutagen
        shell: bash
        run: |
          # Set Mutagen version
          MUTAGEN_VERSION="v0.18.1"
          
          # Detect architecture
          case $(uname -m) in
            x86_64) ARCH="amd64" ;;
            arm64|aarch64) ARCH="arm64" ;;
            *) echo "Unsupported architecture: $(uname -m)"; exit 1 ;;
          esac
          
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            echo "Installing Mutagen for Windows..."
            mkdir -p ~/bin
            curl -L "https://github.com/mutagen-io/mutagen/releases/download/$MUTAGEN_VERSION/mutagen_windows_${ARCH}_${MUTAGEN_VERSION}.zip" -o mutagen.zip
            unzip -o mutagen.zip
            mv mutagen.exe ~/bin/
            rm mutagen.zip
            echo "$HOME/bin" >> $GITHUB_PATH
          
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            echo "Installing Mutagen for macOS..."
            curl -L "https://github.com/mutagen-io/mutagen/releases/download/$MUTAGEN_VERSION/mutagen_darwin_${ARCH}_${MUTAGEN_VERSION}.tar.gz" | tar -xz
            sudo mv mutagen /usr/local/bin/
          
          else
            echo "Installing Mutagen for Linux..."
            curl -L "https://github.com/mutagen-io/mutagen/releases/download/$MUTAGEN_VERSION/mutagen_linux_${ARCH}_${MUTAGEN_VERSION}.tar.gz" | tar -xz
            sudo mv mutagen /usr/local/bin/
          fi
          
          # Verify installation
          echo "Verifying Mutagen installation..."
          mutagen version

      - name: Setup Mutagen Sync with PWD Path Preservation
        shell: bash
        working-directory: ${{ env.TMP_WORKING_DIR }}
        run: |
          # Start Mutagen daemon
          mutagen daemon start
          
          # Get current working directory
          CURRENT_DIR=$(pwd)
          echo "Current directory: $CURRENT_DIR"
          echo "Will sync to remote: $CURRENT_DIR"
          
          echo "Adding remote host key to known_hosts"
          ssh-keyscan -p 2223 localhost >> ~/.ssh/known_hosts 2>/dev/null || true
          
          # Create sync session preserving the exact path structure
          mutagen sync create \
            --name "workspace-sync" \
            --sync-mode "two-way-resolved" \
            --ignore ".git" \
            --ignore "node_modules" \
            --ignore "*.log" \
            --ignore "*.tmp" \
            --ignore ".DS_Store" \
            "$CURRENT_DIR" \
            "runner@localhost:2223:$CURRENT_DIR"
          
          # Wait for initial sync
          echo "Waiting for initial sync to complete..."
          mutagen sync monitor --name "workspace-sync" --timeout 60
          
          # Show sync status
          mutagen sync list --long

#      - name: Run Docker container - Alpine
#        working-directory: ${{ env.TMP_WORKING_DIR }}
#        run: |
#          docker run --rm alpine:latest sh -c "echo 'Hello from Alpine container'; uname -a"
#
#      - name: Run Docker container - Node.js
#        working-directory: ${{ env.TMP_WORKING_DIR }}
#        run: |
#          docker run --rm node:18-alpine node -e "console.log('Node.js version:', process.version)"

# TODO: Install mutagen
# TODO: Change GOTMPDIR
      - name: Run Docker container with volume mount
        shell: bash
        working-directory: ${{ env.TMP_WORKING_DIR }}
        run: |
          # Create a test file in the workspace
          echo "Hello from the host" > test-file.txt

          # Mount the workspace and access the file from the container
          docker run --rm -v "$(pwd):/workspace" alpine:latest sh -c "cat /workspace/test-file.txt && echo 'Hello from the container' >> /workspace/test-file.txt"

          # Verify the file was modified
          cat test-file.txt

      - name: Cleanup Mutagen
        if: always()
        shell: bash
        run: |
          # Stop sync sessions
          mutagen sync terminate --name "workspace-sync" || true
          
          # Stop daemon
          mutagen daemon stop || true
