name: Docker Workflow Example

on:
  push:
    branches: [ main ]

env:
  SSH_JUMP_SERVER: ssh-j.com
  SSH_JUMP_HOST_KEY: |
    [ssh-j.com]:22 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIIiyFQuTwegicQ+8w7dLA7A+4JMZkCk8TLWrKPklWcRt

jobs:
  client-ssh-key:
    name: Generate SSH Key
    runs-on: ubuntu-latest
    outputs:
      private-key: ${{ steps.generate-key.outputs.private_key }}
      public-key: ${{ steps.generate-key.outputs.public_key }}
    steps:
      - name: Generate ED25519 SSH key pair
        id: generate-key
        run: |
          ssh-keygen -t ed25519 -N "" -f ./id_ed25519

          echo "Export private ssh key"
          {
            echo "private_key<<EOF"
            cat ./id_ed25519
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          # TODO: Find a way to protect private key. Masking doesn't work to share between jobs.

          echo "public_key=$(cat ./id_ed25519.pub)" >> $GITHUB_OUTPUT
  
  linux-sidecar:
    name: Linux Docker Sidecar
    needs: [client-ssh-key]
    runs-on: ubuntu-latest
    steps:
      - name: Run Linux Docker sidecar
        uses: lexbritvin/docker-sidecar-action/run-sidecar@main
        with:
          ssh-jump-host: ${{ env.SSH_JUMP_SERVER }}
          ssh-jump-host-key: ${{ env.SSH_JUMP_HOST_KEY }}
          ssh-authorized-keys: ${{ needs.client-ssh-key.outputs.public-key }}

      - name: ⚡ Wait for related jobs
        uses: lexbritvin/wait-for-action@main
        with:
          condition-type: 'job'
          job-name: 'Windows Job'
          timeout-minutes: 30
          poll-interval-seconds: 30

  windows-job:
    name: Windows Job
    needs: [client-ssh-key]
    runs-on: windows-latest
    steps:
      - name: Create run subdir
        shell: bash
        run: |
          TMPDIR="run-$(date +%s)-$RANDOM"
          mkdir -p "$TMPDIR"
          echo "TMP_WORKING_DIR=$TMPDIR" >> $GITHUB_ENV
          echo "Created temporary directory: $TMPDIR"
          cd $TMPDIR

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: ${{ env.TMP_WORKING_DIR }}

      - name: Setup SSH Config
        id: ssh-config
        shell: bash
        env:
          PRIVATE_KEY: ${{ needs.client-ssh-key.outputs.private-key }}
        run: |
          # Create SSH config directory if it doesn't exist
          mkdir -p $HOME/.ssh
          
          PRIVATE_KEY_PATH="$HOME/.ssh/id_ed25519_tmp"
          echo "private_key_path=$PRIVATE_KEY_PATH" >> $GITHUB_OUTPUT
          echo "$PRIVATE_KEY" > "$PRIVATE_KEY_PATH"
          chmod 600 "$PRIVATE_KEY_PATH"
          
          # Convert path to Windows format when on Windows
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            PRIVATE_KEY_PATH_FOR_CONFIG=$(cygpath -w "$PRIVATE_KEY_PATH")
          else
            PRIVATE_KEY_PATH_FOR_CONFIG="$PRIVATE_KEY_PATH"
          fi
          
          SSH_JUMP_HOST="gh-runner-${{ github.job }}-${{ github.run_id }}"
          
          # Create SSH config file
          cat > $HOME/.ssh/config << EOF
          Host *
            StrictHostKeyChecking no
          Host jump-server
            HostName ${{ env.SSH_JUMP_SERVER }}
            User $SSH_JUMP_HOST
            IdentityFile "$PRIVATE_KEY_PATH_FOR_CONFIG"
            StrictHostKeyChecking no
            PreferredAuthentications publickey
          
          Host docker-sidecar
            HostName $SSH_JUMP_HOST
            Port 2222
            User runner
            IdentityFile "$PRIVATE_KEY_PATH_FOR_CONFIG"
            ProxyJump jump-server
            StrictHostKeyChecking no
            PreferredAuthentications publickey
          EOF
          
          echo "SSH_DOCKER_HOST=docker-sidecar" >> $GITHUB_ENV
          
          echo "SSH config created:"
          cat $HOME/.ssh/config

      # Set up the Docker sidecar environment
      - name: Set up Remote Docker
        id: docker-setup
        uses: lexbritvin/docker-sidecar-action/setup-remote-docker@main
        with:
          private_key_path: ${{ steps.ssh-config.outputs.private-key-path }}
          known_hosts: |
            ${{ env.SSH_JUMP_HOST_KEY }}

      - name: Forward Docker port
        uses: lexbritvin/ssh-port-forward-action@main
        with:
          host: ${{ env.SSH_DOCKER_HOST }}
          remote_forwards: "1445:localhost:445" # SMB share to local directory.
          known_hosts: |
            ${{ env.SSH_JUMP_HOST_KEY }}

      - name: Create SMB user and share on Windows
        shell: powershell
        working-directory: ${{ env.TMP_WORKING_DIR }}
        run: |
          # Get current working directory for the share
          $CURRENT_DIR = Get-Location
          $SHARE_NAME = "workspace_share"
          $SMB_USER = "smbuser"
          $SMB_PASSWORD = "SecurePass123!"

          # Create new local user with password on Windows
          $SecurePassword = ConvertTo-SecureString $SMB_PASSWORD -AsPlainText -Force
          New-LocalUser -Name $SMB_USER -Password $SecurePassword -FullName "SMB User" -Description "User for SMB sharing"

          # Add user to appropriate groups for file sharing
          Add-LocalGroupMember -Group "Users" -Member $SMB_USER
          Add-LocalGroupMember -Group "Power Users" -Member $SMB_USER -ErrorAction SilentlyContinue

          # Create SMB share on current directory
          New-SmbShare -Name $SHARE_NAME -Path $CURRENT_DIR -FullAccess $SMB_USER -ChangeAccess "Everyone"

          # Grant full control using icacls
          icacls $CURRENT_DIR /grant "${SMB_USER}:(OI)(CI)F" /T

          Write-Host "SMB share '$SHARE_NAME' created at path: $CURRENT_DIR"
          Write-Host "User '$SMB_USER' created and granted access"

      - name: Create equivalent path and mount CIFS on Linux
        shell: bash
        working-directory: ${{ env.TMP_WORKING_DIR }}
        run: |
          # Get current working directory (convert Windows path format if needed)
          CURRENT_DIR=$(pwd)
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            MOUNT_POINT="/mnt$CURRENT_DIR"
          fi
          
          SHARE_NAME="workspace_share"
          SMB_USER="smbuser"
          SMB_PASSWORD="SecurePass123!"
          
          # Execute all commands in a single SSH session
          ssh ${{ env.SSH_DOCKER_HOST }} "
            set -e
            
            echo 'Create mount point on Linux: $MOUNT_POINT'
            sudo mkdir -p '$MOUNT_POINT'
            
            echo 'Create credentials file for CIFS mount'
            echo 'username=$SMB_USER' | sudo tee /etc/cifs-credentials > /dev/null
            echo 'password=$SMB_PASSWORD' | sudo tee -a /etc/cifs-credentials > /dev/null
            echo 'domain=WORKGROUP' | sudo tee -a /etc/cifs-credentials > /dev/null
            sudo chmod 600 /etc/cifs-credentials

            echo 'Mount the Windows SMB share via forwarded port'
            sudo mount -t cifs //localhost/$SHARE_NAME '$MOUNT_POINT' -o credentials=/etc/cifs-credentials,port=1445,vers=3.0,iocharset=utf8,file_mode=0777,dir_mode=0777,nobrl
            
            echo 'Verify the mount is successful:'
            df -h | grep '$MOUNT_POINT'
            
            echo 'Test file operations'
            echo 'Test from Linux CIFS mount to Windows share' | sudo tee '$MOUNT_POINT/linux_test.txt'
            cat '$MOUNT_POINT/linux_test.txt'
            sudo rm '$MOUNT_POINT/linux_test.txt'
            
            echo 'CIFS mount successful!'
          "

      - name: Run Docker container with volume mount
        shell: bash
        working-directory: ${{ env.TMP_WORKING_DIR }}
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            export MSYS_NO_PATHCONV=1
          fi
          # Create a test file in the workspace
          echo "Hello from the host" > test-file.txt

          # Mount the workspace and access the file from the container
          docker run --rm -v "/mnt$(pwd):/workspace" alpine:latest sh -c "cat /workspace/test-file.txt && echo 'Hello from the container' >> /workspace/test-file.txt"

          # Verify the file was modified
          cat test-file.txt | grep "Hello from the container"
          cat test-file.txt
