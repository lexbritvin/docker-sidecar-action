name: Docker Workflow Example

on:
  push:
    branches: [ main ]

env:
  SSH_JUMP_SERVER: ssh-j.com
  SSH_JUMP_HOST_KEY: |
    ssh-j.com ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIIiyFQuTwegicQ+8w7dLA7A+4JMZkCk8TLWrKPklWcRt

jobs:
  client-ssh-key:
    name: Generate SSH Key
    runs-on: ubuntu-latest
    outputs:
      private-key: ${{ steps.generate-key.outputs.private_key }}
      public-key: ${{ steps.generate-key.outputs.public_key }}
    steps:
      - name: Generate ED25519 SSH key pair
        id: generate-key
        run: |
          ssh-keygen -t ed25519 -N "" -f ./id_ed25519

          echo "Export private ssh key"
          {
            echo "private_key<<EOF"
            cat ./id_ed25519
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          # TODO: Find a way to protect private key. Masking doesn't work to share between jobs.

          echo "public_key=$(cat ./id_ed25519.pub)" >> $GITHUB_OUTPUT
  
  linux-sidecar:
    name: Linux Docker Sidecar
    needs: [client-ssh-key]
    runs-on: ubuntu-latest
    steps:
      - name: Run Linux Docker sidecar
        uses: lexbritvin/docker-sidecar-action/run-sidecar@main
        with:
          wait-for-job: "Windows Job"
          jump-host: ${{ env.SSH_JUMP_SERVER }}
          jump-host-key: ${{ env.SSH_JUMP_HOST_KEY }}
          authorized-keys: ${{ needs.client-ssh-key.outputs.public-key }}
  
  windows-job:
    name: Windows Job
    needs: [client-ssh-key]
    runs-on: windows-latest
    env:
      SSH_JUMP_HOST: gh-linux-sidecar-${{ github.run_id }}-sidecar
    steps:
      - name: Create run subdir
        shell: bash
        run: |
          TMPDIR="run-$(date +%s)-$RANDOM"
          mkdir -p "$TMPDIR"
          echo "TMP_WORKING_DIR=$TMPDIR" >> $GITHUB_ENV
          echo "Created temporary directory: $TMPDIR"
          cd $TMPDIR

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: ${{ env.TMP_WORKING_DIR }}

      - name: Setup SSH Config
        shell: bash
        env:
          PRIVATE_KEY: ${{ needs.client-ssh-key.outputs.private-key }}
        run: |
          # Create SSH config directory if it doesn't exist
          mkdir -p $HOME/.ssh
          
          PRIVATE_KEY_PATH="$HOME/.ssh/id_ed25519_tmp"
          echo "$PRIVATE_KEY" > "$PRIVATE_KEY_PATH"
          chmod 600 "$PRIVATE_KEY_PATH"
          
          # Convert path to Windows format when on Windows
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            PRIVATE_KEY_PATH_FOR_CONFIG=$(cygpath -w "$PRIVATE_KEY_PATH")
          else
            PRIVATE_KEY_PATH_FOR_CONFIG="$PRIVATE_KEY_PATH"
          fi
          
          # Create SSH config file
          cat > $HOME/.ssh/config << EOF
          Host jump-server
            HostName ${{ env.SSH_JUMP_SERVER }}
            User ${{ env.SSH_JUMP_HOST }}
            IdentityFile "$PRIVATE_KEY_PATH_FOR_CONFIG"
            StrictHostKeyChecking no
            PreferredAuthentications publickey
          
          Host docker-sidecar
            HostName ${{ env.SSH_JUMP_HOST }}
            Port 2222
            User runner
            IdentityFile "$PRIVATE_KEY_PATH_FOR_CONFIG"
            ProxyJump jump-server
            StrictHostKeyChecking no
            PreferredAuthentications publickey
          EOF
          
          echo "SSH config created:"
          cat $HOME/.ssh/config

      # Set up the Docker sidecar environment
      - name: Set up Remote Docker
        id: docker-setup
        uses: lexbritvin/docker-sidecar-action@main

      - name: Forward Docker port
        uses: lexbritvin/ssh-port-forward-action@main
        with:
          host: docker-sidecar
          local_forwards: "2376:localhost:2376"
          known_hosts: |
            ${{ env.SSH_JUMP_HOST_KEY }}

      - name: Install Mutagen
        shell: bash
        run: |
          # Set Mutagen version
          MUTAGEN_VERSION=$(curl -s https://api.github.com/repos/mutagen-io/mutagen/releases/latest | jq -r '.tag_name')
          
          # Detect architecture
          case $(uname -m) in
            x86_64) ARCH="amd64" ;;
            arm64|aarch64) ARCH="arm64" ;;
            *) echo "Unsupported architecture: $(uname -m)"; exit 1 ;;
          esac
          
          # Detect OS and binary name
          BINARY="mutagen"
          case "$RUNNER_OS" in
            Windows) OS="windows" BINARY="$BINARY.exe" ;;
            macOS) OS="darwin" ;;
            Linux) OS="linux" ;;
            *) echo "Unsupported OS: $RUNNER_OS"; exit 1 ;;
          esac
          
          # Download, extract, and install
          echo "Installing Mutagen..."
          mkdir -p ~/bin
          curl -s -L "https://github.com/mutagen-io/mutagen/releases/download/$MUTAGEN_VERSION/mutagen_${OS}_${ARCH}_${MUTAGEN_VERSION}.tar.gz" -o mutagen.tar.gz
          tar -xzf mutagen.tar.gz
          mv "$BINARY" ~/bin/
          mv mutagen-agents.tar.gz ~/bin/mutagen-agents.tar.gz
          rm mutagen.tar.gz
          echo "$HOME/bin" >> $GITHUB_PATH

          # Verify installation
          echo "Verifying Mutagen installation..."
          mutagen version

      - name: Setup Mutagen Sync with PWD Path Preservation
        shell: bash
        working-directory: ${{ env.TMP_WORKING_DIR }}
        run: |
          REMOTE_HOST="docker-sidecar"
          # Start Mutagen daemon
          mutagen daemon start
          
          # Get current working directory
          CURRENT_DIR=$(pwd)
          REMOTE_DIR=$CURRENT_DIR
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            CURRENT_DIR=$(cygpath -w "$CURRENT_DIR")
          fi

          echo "Current directory: $CURRENT_DIR"
          echo "Will sync to remote: $REMOTE_DIR"
          
          echo "Ensure remote directory exists and writable"
          ssh $REMOTE_HOST sh -c "sudo mkdir -p $REMOTE_DIR; sudo chown \$UID"
          
          # Create sync session preserving the exact path structure
          mutagen sync create \
            --name "workspace-sync" \
            --sync-mode "two-way-resolved" \
            --ignore ".git" \
            --ignore "node_modules" \
            --ignore "*.log" \
            --ignore "*.tmp" \
            --ignore ".DS_Store" \
            "$CURRENT_DIR" \
            "$REMOTE_HOST:$REMOTE_DIR"
          
          # Wait for initial sync
          echo "Waiting for initial sync to complete..."
          mutagen sync flush "workspace-sync"
          
          # Show sync status
          mutagen sync list "workspace-sync" --long

      - name: 🛠 Set up tmate session 🛠
        id: tmate
        uses: mxschmitt/action-tmate@v3
        if: ${{ failure() }}
        with:
          limit-access-to-actor: true

#      - name: Run Docker container - Alpine
#        working-directory: ${{ env.TMP_WORKING_DIR }}
#        run: |
#          docker run --rm alpine:latest sh -c "echo 'Hello from Alpine container'; uname -a"
#
#      - name: Run Docker container - Node.js
#        working-directory: ${{ env.TMP_WORKING_DIR }}
#        run: |
#          docker run --rm node:18-alpine node -e "console.log('Node.js version:', process.version)"

# TODO: Install mutagen
# TODO: Change GOTMPDIR
      - name: Run Docker container with volume mount
        shell: bash
        working-directory: ${{ env.TMP_WORKING_DIR }}
        run: |
          # Create a test file in the workspace
          echo "Hello from the host" > test-file.txt

          # Mount the workspace and access the file from the container
          docker run --rm -v "$(pwd):/workspace" alpine:latest sh -c "cat /workspace/test-file.txt && echo 'Hello from the container' >> /workspace/test-file.txt"

          # Verify the file was modified
          cat test-file.txt

      - name: Cleanup Mutagen
        if: always()
        shell: bash
        run: |
          # Stop sync sessions
          mutagen sync terminate --name "workspace-sync" || true
          
          # Stop daemon
          mutagen daemon stop || true
